<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            /* 采用中心极光暗蓝向外围纯黑渐变的深邃夜空底色 */
            background: radial-gradient(circle at 50% 50%, #09081a 0%, #030206 100%);
            margin: 0;
            overflow-x: hidden;
            /* 换成干净、高级的现代无衬线字体，立刻消除土味和AI模板感 */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: #ffffff;
        }
        #particleCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

        /* 导航栏 */
        .navbar {
            position: fixed; top: 0; left: 0; width: 100%; height: 70px;
            background: rgba(11, 9, 26, 0.6); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 117, 140, 0.1); display: flex; justify-content: center; align-items: center; z-index: 10;
        }
        .nav-links { display: flex; list-style: none; gap: 50px; }
        .nav-links a { color: rgba(255, 255, 255, 0.8); text-decoration: none; font-size: 1rem; letter-spacing: 2px; position: relative; padding: 8px 0; transition: color 0.3s ease; }
        .nav-links a:hover, .nav-links a.active { color: #ff7eb3; text-shadow: 0 0 10px rgba(255, 126, 179, 0.5); }
        .nav-links a::after { content: ''; position: absolute; bottom: 0; left: 50%; width: 0; height: 2px; background: linear-gradient(90deg, #ff758c, #ff7eb3); transition: all 0.3s ease; transform: translateX(-50%); }
        .nav-links a:hover::after, .nav-links a.active::after { width: 100%; }

        .container { position: relative; z-index: 2; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 120px 20px 40px 20px; }
        header { text-align: center; margin-bottom: 40px; animation: fadeInDown 1.5s ease; }
        header h1 { font-size: 2.2rem; font-weight: 300; letter-spacing: 4px; background: linear-gradient(45deg, #ff758c 0%, #ff7eb3 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* 控制台与上传按钮区域 */

            width: 100%; max-width: 1100px;

        .btn { display: inline-block; padding: 12px 25px; color: white; font-size: 0.95rem; font-weight: bold; letter-spacing: 1px; border-radius: 30px; cursor: pointer; transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1); border: none; text-align: center; }
        
        .btn-cutewreath { background: linear-gradient(45deg, #ff758c, #ff9ff3); box-shadow: 0 4px 15px rgba(255, 117, 140, 0.3); }
        .btn-play { background: linear-gradient(45deg, #ff758c, #ff7eb3); box-shadow: 0 4px 15px rgba(255, 117, 140, 0.3); }
        .btn-icecream { background: linear-gradient(45deg, #a29bfe, #6c5ce7); box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3); }
        .btn-pangdonglai { background: linear-gradient(45deg, #00cec9, #00b894); box-shadow: 0 4px 15px rgba(0, 184, 148, 0.3); }
        
        .btn-create-category { background: transparent; border: 2px dashed #ff7eb3; color: #ff7eb3; box-shadow: none; }
        .btn-create-category:hover { background: rgba(255, 126, 179, 0.1); color: #fff; border-color: #fff; }

        .btn-delete-category { background: transparent; border: 2px dashed #ff4757; color: #ff4757; box-shadow: none; }
        .btn-delete-category:hover { background: rgba(255, 71, 87, 0.15); color: #fff; border-color: #fff; }
        
        .btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(255, 255, 255, 0.2); filter: brightness(1.1); }
        
        .hidden-input { display: none; }
        
        /* 优雅流光进度条样式 */
        .progress-container {
            width: 100%; max-width: 500px; margin: 20px auto 0 auto;
            display: none; flex-direction: column; align-items: center; gap: 8px;
        }
        .progress-text { font-size: 0.9rem; color: #ff7eb3; font-weight: lighter; letter-spacing: 1px; text-align: center; line-height: 1.5; }
        .progress-bar-bg {
            width: 100%; height: 8px; background: rgba(255, 255, 255, 0.1);
            border-radius: 10px; overflow: hidden; position: relative; border: 1px solid rgba(255, 117, 140, 0.1);
        }
        .progress-bar-fill {
            width: 0%; height: 100%;
            background: linear-gradient(90deg, #ff758c, #ff7eb3, #a29bfe);
            background-size: 200% 100%; animation: gradientMove 2s linear infinite;
            border-radius: 10px; transition: width 0.1s linear;
        }

        @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* 分类大板块整体样式 */
        .category-section { width: 100%; max-width: 1200px; margin: 0 auto 60px auto; display: flex; flex-direction: column; align-items: center; }

        .flower-wreath { display: inline-block; font-size: 1.6rem; animation: rotateWreath 6s linear infinite; transform-origin: center; }

        .tag-cutewreath { color: #ff758c; text-shadow: 0 0 8px rgba(255,117,140,0.4); }
        .tag-play { color: #ff7eb3; text-shadow: 0 0 8px rgba(255,126,179,0.3); }
        .tag-icecream { color: #a29bfe; text-shadow: 0 0 8px rgba(162,155,254,0.3); }
        .tag-pangdonglai { color: #00cec9; text-shadow: 0 0 8px rgba(0,206,201,0.3); }

        /* 无缝跑马灯视口 */
        .marquee-viewport { width: 100%; overflow: hidden; background: rgba(255, 255, 255, 0.01); padding: 20px 0; border-radius: 16px; position: relative; }
        .marquee-track { display: flex; width: max-content; gap: 30px; padding: 0 15px; min-height: 100px; align-items: center; }
        .track-autoplay { animation: scrollLeft 35s linear infinite; }
        .marquee-viewport:hover .marquee-track { animation-play-state: paused; }

        /* 照片卡片外壳 */
        .photo-item { width: 240px; height: 320px; flex-shrink: 0; position: relative; border-radius: 16px; cursor: pointer; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4); transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.6s ease; }
        .photo-item:hover { transform: scale(1.08); box-shadow: 0 15px 35px rgba(255, 117, 140, 0.25); z-index: 5; }
        .photo-inner { width: 100%; height: 100%; border-radius: 16px; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.1); position: relative; }
        .photo-inner img { width: 100%; height: 100%; object-fit: cover; }
        .photo-desc { position: absolute; bottom: 0; left: 0; width: 100%; padding: 15px; background: linear-gradient(transparent, rgba(11, 9, 26, 0.95)); text-align: center; }
        .photo-desc h3 { font-size: 1rem; color: #fff; margin-bottom: 4px; }
        .photo-desc p { font-size: 0.8rem; color: rgba(255, 255, 255, 0.6); }

        /* 单张图片上的迷你悬浮删除按钮 (×) */
        .img-delete-btn {
            position: absolute; top: 12px; right: 12px; width: 32px; height: 32px; border-radius: 50%;
            background: rgba(255, 71, 87, 0.9); color: white; font-size: 20px; font-weight: bold;
            display: flex; align-items: center; justify-content: center; border: none; cursor: pointer;

        }
        .photo-item:hover .img-delete-btn { opacity: 1; transform: scale(1); }
        .img-delete-btn:hover { background: #ff4757; transform: scale(1.15) !important; }

        .empty-tip { color: rgba(255, 255, 255, 0.25); font-size: 0.9rem; padding: 30px 20px; text-align: center; width: 100%; letter-spacing: 1px; }

        /* 灯箱大图层 */
        .lightbox-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(11, 9, 26, 0.9); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); display: flex; justify-content: center; align-items: center; z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.5s cubic-bezier(0.25, 1, 0.5, 1); }
        .lightbox-overlay.active { opacity: 1; pointer-events: auto; }
        .lightbox-img { max-width: 85%; max-height: 85%; border-radius: 12px; box-shadow: 0 0 50px rgba(255, 117, 140, 0.3); transform: scale(0.9); transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1); }
        .lightbox-overlay.active .lightbox-img { transform: scale(1); }

        /* 🎨 新增：极其精美的毛玻璃密码验证模态框样式 */
        .pwd-modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 9, 26, 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            display: flex; justify-content: center; align-items: center; z-index: 200;

        }
        .pwd-modal-overlay.active { opacity: 1; pointer-events: auto; }
        .pwd-modal-card {
            width: 90%; max-width: 400px; padding: 30px;
            background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 117, 140, 0.2);
            border-radius: 24px; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center; transform: scale(0.85); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .pwd-modal-overlay.active .pwd-modal-card { transform: scale(1); }
        .pwd-title { font-size: 1.2rem; font-weight: normal; color: #ff7eb3; letter-spacing: 1px; margin-bottom: 10px; }
        .pwd-tip { font-size: 0.85rem; color: rgba(255, 255, 255, 0.5); margin-bottom: 20px; line-height: 1.4; }
        .pwd-input {
            width: 100%; padding: 12px 20px; font-size: 1.1rem; text-align: center; color: white;
            background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.15);

        }
        .pwd-input:focus { border-color: #ff758c; box-shadow: 0 0 15px rgba(255, 117, 140, 0.3); background: rgba(255, 255, 255, 0.12); }
        .pwd-actions { display: flex; gap: 15px; justify-content: center; }
        .btn-pwd-cancel { background: rgba(255, 255, 255, 0.1); color: rgba(255, 255, 255, 0.7); }

        .btn-pwd-confirm { background: linear-gradient(45deg, #ff4757, #ff758c); box-shadow: 0 4px 12px rgba(255, 71, 87, 0.3); }

        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scrollLeft { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        @keyframes rotateWreath { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

            initUploadListeners();  
            initLightbox();
            initPasswordModal(); // 初始化新版密码面板监听
        });

        async function fetchAllCategories() {
            try {
                const dataMap = {};
                Object.keys(categories).forEach(k => dataMap[k] = []);

                for (const catKey of Object.keys(categories)) {
                    const { data: catFiles, error } = await _supabase.storage
                        .from('photos')
                        .list(catKey, { sortBy: { column: 'created_at', order: 'desc' } });
                    
                    if (catFiles) {
                        dataMap[catKey] = catFiles.filter(f => f.name !== '.emptyFolderPlaceholder');
                    }
                }

                Object.keys(categories).forEach(catKey => {
                    const track = document.getElementById(categories[catKey].id);
                    if (!track) return;

                    track.innerHTML = '';
                    const filesArray = dataMap[catKey];
                    
                    if (!filesArray || filesArray.length === 0) {
                        track.innerHTML = `<div class="empty-tip">点击上方按钮，开始记录属于你们的第一个甜蜜瞬间吧...</div>`;
                        return;
                    }

                    let cardsHtml = '';
                    filesArray.forEach(file => {
                        const { data: urlObj } = _supabase.storage
                            .from('photos')
                            .getPublicUrl(`${catKey}/${file.name}`);

                        const timeStr = file.created_at ? new Date(file.created_at).toLocaleDateString() : new Date().toLocaleDateString();
                        const fullPath = `${catKey}/${file.name}`;
                        
                        const freshUrl = `${urlObj.publicUrl}?t=${new Date(file.created_at || Date.now()).getTime()}`;

                        cardsHtml += `
                            <div class="photo-item" onclick="openLightbox('${freshUrl}')">
                                <button class="img-delete-btn" onclick="event.stopPropagation(); requestDeleteImage('${fullPath}')">×</button>
                                <div class="photo-inner">
                                    <img src="${freshUrl}" alt="回忆">
                                    <div class="photo-desc">
                                        <h3>${categories[catKey].title}</h3>
                                        <p>记录于 ${timeStr}</p>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                    track.innerHTML = cardsHtml + cardsHtml;
                });
            } catch (e) { 
                console.error("读取出错:", e); 
            }
        }

        // ==========================================
        // 🔒 新增：控制流密码拦截逻辑
        // ==========================================
        function requestDeleteImage(storagePath) {
            currentDeletingPath = storagePath; // 记住想要删除哪张
            pwdInputField.value = '';          // 清空输入框
            pwdModalOverlay.classList.add('active'); // 唤起好看的密码框
            setTimeout(() => pwdInputField.focus(), 100); // 聚焦光标
        }

        function initPasswordModal() {
            // 点击取消
            pwdCancelBtn.addEventListener('click', () => {
                pwdModalOverlay.classList.remove('active');
                currentDeletingPath = null;
            });

            // 点击确认
            pwdConfirmBtn.addEventListener('click', handlePasswordVerify);

            // 支持键盘直接敲回车快速验证
            pwdInputField.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') handlePasswordVerify();
            });
        }

        async function handlePasswordVerify() {
            const userInput = pwdInputField.value;
            
            if (userInput !== DELETE_SAFE_PASSWORD) {
                alert("❌ 密码验证失败，本次回忆销毁请求已被彻底拒绝！");
                pwdInputField.value = '';
                pwdInputField.focus();
                return;
            }

            // 验证通过，隐藏弹窗并开始执行真正的 Supabase 核心物理删除
            pwdModalOverlay.classList.remove('active');
            if (!currentDeletingPath) return;

            progressWrapper.style.display = 'flex';
            progressBar.style.width = '50%';
            progressStatus.innerText = "正在从云端彻底销毁该瞬间...";
            
            try {
                const { error } = await _supabase.storage.from('photos').remove([currentDeletingPath]);
                if (error) throw error;
                
                progressBar.style.width = '100%';
                progressStatus.innerText = "✨ 移除成功！正在重新整理相册...";
                currentDeletingPath = null;
                
                await fetchAllCategories(); 
                setTimeout(() => { 
                    progressWrapper.style.display = 'none'; 
                    progressBar.style.width = '0%';
                }, 1000);
            } catch (err) {
                console.error("删除失败:", err);
                alert("物理删除失败，请检查云端 bucket 权限。");
                progressWrapper.style.display = 'none';
            }
        }

        createCategoryBtn.addEventListener('click', () => {
            const newName = prompt("请输入你想新建的纪念主题名字：\n(例如：一起看电影、异地恋爱)");
            if (!newName || newName.trim() === "") return;

            const catKey = 'custom_' + Date.now().toString(36);
            categories[catKey] = { id: `track-${catKey}`, title: newName, display: newName };

            appendCategoryDOM(catKey, newName, newName);
            saveCustomCategories();
            fetchAllCategories();
        });

        function appendCategoryDOM(catKey, title, display) {
            const label = document.createElement('label');
            label.setAttribute('for', `input-${catKey}`);
            label.setAttribute('data-btnkey', catKey);
            label.className = 'btn';
            label.style.background = 'linear-gradient(45deg, #a29bfe, #ff7eb3)';
            label.innerText = `🎵 ${title}`;
            
            const input = document.createElement('input');
            input.type = 'file'; input.id = `input-${catKey}`; input.className = 'hidden-input';
            input.setAttribute('accept', 'image/*'); input.setAttribute('multiple', '');
            input.setAttribute('data-cat', catKey);

            buttonContainer.insertBefore(label, createCategoryBtn);
            buttonContainer.insertBefore(input, createCategoryBtn);

            const section = document.createElement('section');
            section.className = 'category-section';
            section.id = `section-${catKey}`;
            section.setAttribute('data-displayname', display);
            section.innerHTML = `
                <div class="category-header">
                    <div class="line-left"></div>
                    <h2 style="color: #ff7eb3; text-shadow: 0 0 8px rgba(255,126,179,0.3);"><span class="flower-wreath">🌸</span> ${display}</h2>
                    <div class="line-right"></div>
                </div>
                <div class="marquee-viewport">
                    <div class="marquee-track track-autoplay" style="animation-duration: 38s;" id="track-${catKey}"></div>
                </div>
            `;
            sectionsWrapper.appendChild(section);
            bindSingleUploadListener(input);
        }

        deleteCategoryBtn.addEventListener('click', () => {
            let availableNames = Object.keys(categories).map(k => `• ${categories[k].display}`).join('\n');
            const targetName = prompt(`请输入想要彻底移除的“大相册主题完整标题”：\n\n当前已有相册名：\n${availableNames}`);
            if (!targetName || targetName.trim() === "") return;

            const matchedKey = Object.keys(categories).find(k => categories[k].display.trim() === targetName.trim());
            if (!matchedKey) {
                alert("没有找到对应的栏目名称，请确保输入的字眼完全一致哦！");
                return;
            }

            if (confirm(`⚠️ 确定要删除【${targetName}】整个布局板块及上传按钮吗？`)) {
                const sectionEl = document.getElementById(`section-${matchedKey}`);
                if (sectionEl) sectionEl.remove();
                const labelEl = document.querySelector(`label[data-btnkey="${matchedKey}"]`);
                const inputEl = document.getElementById(`input-${matchedKey}`);
                if (labelEl) labelEl.remove();
                if (inputEl) inputEl.remove();

                delete categories[matchedKey];
                saveCustomCategories();
                alert(`🎉 【${targetName}】大主题栏目已被移出布局！`);
            }
        });

        function initUploadListeners() {
            document.querySelectorAll('.hidden-input').forEach(bindSingleUploadListener);
        }

        function bindSingleUploadListener(inputEl) {
            inputEl.addEventListener('change', async function() {
                const files = Array.from(this.files).filter(f => f.type.match('image.*'));
                if(files.length === 0) return;

                const catType = this.getAttribute('data-cat');
                
                progressWrapper.style.display = 'flex';
                progressBar.style.width = '0%';
                progressStatus.innerHTML = `准备同步 0 / ${files.length} 张照片...`;

                let overallSuccessCount = 0;

                for(let i = 0; i < files.length; i++) {
                    const file = files[i];
                    const fileExt = file.name.split('.').pop();
                    const fileName = `${catType}/${Date.now()}-${Math.random().toString(36).substr(2, 5)}.${fileExt}`;
                    
                    try {
                        const { error } = await _supabase.storage.from('photos').upload(fileName, file, {
                            cacheControl: '3600',
                            upsert: false,
                            onUploadProgress: (progress) => {
                                const currentFilePercent = progress.loaded / progress.total;
                                const totalCalculatedPercent = Math.round(
                                    ((overallSuccessCount + currentFilePercent) / files.length) * 100
                                );
                                progressBar.style.width = `${totalCalculatedPercent}%`;
                                progressStatus.innerHTML = `
                                    正在同步到 【${categories[catType].title}】<br>
                                    正在传输第 <span style="color:#ff7eb3;font-weight:bold;">${i + 1} / ${files.length}</span> 张照片<br>
                                    当前图片进度：${Math.round(currentFilePercent * 100)}% | 总体进度：${totalCalculatedPercent}%
                                `;
                            }
                        });
                        
                        if (error) throw error;
                        overallSuccessCount++;
                        
                        const stepPercent = Math.round((overallSuccessCount / files.length) * 100);
                        progressBar.style.width = `${stepPercent}%`;
                        
                    } catch (e) { 
                        console.error("上传错误:", e); 
                    }
                }

                progressStatus.innerHTML = `🎉 成功！本次共 <span style="color:#00cec9;font-weight:bold;">${overallSuccessCount}</span> 个甜蜜瞬间已成功珍藏入库。`;
                this.value = '';
                
                await fetchAllCategories();
                
                setTimeout(() => { 
                    progressWrapper.style.display = 'none'; 
                    progressBar.style.width = '0%';
                }, 1800);
            });
        }

        const lightboxOverlay = document.getElementById('lightboxOverlay');
        const lightboxImg = document.getElementById('lightboxImg');
        function openLightbox(src) { lightboxImg.src = src; lightboxOverlay.classList.add('active'); }
        function initLightbox() { lightboxOverlay.addEventListener('click', () => lightboxOverlay.classList.remove('active')); }

        function saveCustomCategories() {
            const customOnly = {};
            Object.keys(categories).forEach(k => {
                if (!defaultCategories[k]) customOnly[k] = categories[k];
            });
            localStorage.setItem('our_only_custom_cats', JSON.stringify(customOnly));
        }
        function loadCustomCategories() {
            const saved = localStorage.getItem('our_only_custom_cats');
            if (saved) {
                const parsed = JSON.parse(saved);
                Object.keys(parsed).forEach(key => {
                    categories[key] = parsed[key];
                    appendCategoryDOM(key, parsed[key].title, parsed[key].display);
                });
            }
        }
    </script>

	    <source src="music/bgm.mp3" type="audio/mpeg">
	</audio>

	<div class="music-player" id="musicToggle">
	    🎵
	</div>
